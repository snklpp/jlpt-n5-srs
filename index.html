<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="JLPT N5 vocabulary — spaced-repetition flashcards." />
    <title>JLPT N5 · 語彙 SRS</title>

    <!-- Installable PWA / Add to Home Screen -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JLPT N5" />

    <style>
      html, body { margin: 0; height: 100%; background: #0f1117; }
    </style>

    <!-- Set theme before paint so there's no light/dark flash on refresh -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem("jlpt_n5_srs_v1") || "{}");
          var t = s.theme || "dark";
          if (t === "auto") {
            t = window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          var bg = t === "light" ? "#f4f1ea" : "#0f1117";
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.background = bg;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", bg);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
