# Render Blueprint — deploys the app as a static site plus a sync backend.
# In Render: New ▸ Blueprint, point it at this repo, and it reads this file.
services:
  - type: web
    name: jlpt-n5-srs
    runtime: static
    autoDeploy: true
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_CLOUD_URL
        value: https://jlpt-sync.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: jlpt-sync
    runtime: node
    autoDeploy: true
    buildCommand: cd sync-server && npm install
    startCommand: cd sync-server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jlpt-sync-db
          property: connectionString

databases:
  - name: jlpt-sync-db
    databaseName: jlpt_sync
    user: jlpt_sync
